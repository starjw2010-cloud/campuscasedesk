services:
  mariadb:
    image: mariadb:11.4
    container_name: campuscasedesk-mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: campusflow
      MARIADB_USER: campusflow
      MARIADB_PASSWORD: campusflow_dev
      MARIADB_ROOT_PASSWORD: campusflow_root_dev
    ports:
      - "3307:3306"
    volumes:
      - campuscasedesk_mariadb:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mariadb-admin ping -h 127.0.0.1 -uroot -p$${MARIADB_ROOT_PASSWORD} --silent",
        ]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  campuscasedesk_mariadb:

